<!DOCTYPE html>
<html>
<head>
    <title>Live Blog</title>
</head>

<body>

<h1>Live Blog Feed</h1>

<div id="blogs"></div>

<hr>

<h2>Tambah Blog</h2>

<input id="title" placeholder="Title"><br><br>
<input id="author" placeholder="Author"><br><br>
<textarea id="content" placeholder="Content"></textarea><br><br>

<button onclick="addBlog()">Post Blog</button>

<script>

const API_URL = "http://localhost:8001/api/blogs"

async function fetchBlogs() {

    const response = await fetch(API_URL)
    const blogs = await response.json()

    const container = document.getElementById("blogs")
    container.innerHTML = ""

    blogs.forEach(blog => {

        const div = document.createElement("div")

        div.innerHTML = `
        <h3>${blog.title}</h3>
        <p>${blog.content}</p>
        <small>Author: ${blog.author}</small>
        <hr>
        `

        container.appendChild(div)

    })

}

async function addBlog() {

    const title = document.getElementById("title").value
    const content = document.getElementById("content").value
    const author = document.getElementById("author").value

    const blog = {
        id: Date.now(),
        title: title,
        content: content,
        author: author
    }

    await fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(blog)
    })

    fetchBlogs()

}

fetchBlogs()

setInterval(fetchBlogs, 2000)

</script>

</body>
</html>
